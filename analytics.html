<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D1321">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>FinTrack — Analytics</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/analytics.css">
</head>
<body>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-head" style="display:flex;align-items:center;gap:10px;">
    <svg viewBox="0 0 64 64" fill="none" style="width:32px;height:32px;flex-shrink:0;">
      <rect x="6" y="34" width="12" height="22" fill="#D4AF37"/>
      <rect x="22" y="20" width="12" height="36" fill="#64748B"/>
      <rect x="38" y="6" width="12" height="50" fill="#F3F4F6"/>
      <path d="M4 58 C 20 58, 30 40, 56 8" stroke="#0D1321" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="wordmark" style="font-size:20px;">Fin<span>Track</span></div>
  </div>
  <a class="drawer-item" href="app.html" style="text-decoration:none;"><span class="di-icon">📊</span> Dashboard</a>
  <a class="drawer-item" href="salary.html" style="text-decoration:none;"><span class="di-icon">💼</span> Salary</a>
  <a class="drawer-item" id="drawerOwe" href="debts.html?view=owe" style="text-decoration:none;"><span class="di-icon">📤</span> Debt I Owe</a>
  <a class="drawer-item" id="drawerReceive" href="debts.html?view=receive" style="text-decoration:none;"><span class="di-icon">📥</span> Money to Receive</a>
  <a class="drawer-item" href="goals.html" style="text-decoration:none;"><span class="di-icon">🐖</span> Savings Goals</a>
  <a class="drawer-item active" href="analytics.html" style="text-decoration:none;"><span class="di-icon">📈</span> Analytics</a>
  <a class="drawer-item" href="settings.html" style="text-decoration:none;"><span class="di-icon">⚙️</span> Settings</a>
  <button class="drawer-item" onclick="logout()"><span class="di-icon">🚪</span> Logout</button>
</nav>

<div class="app-shell">
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <div class="brand">Analytics</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="refreshBtn" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <a class="icon-btn" href="app.html" aria-label="Back" style="text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>
    </div>
  </header>

  <div class="period-row">
    <button class="active" data-period="daily">Daily</button>
    <button data-period="weekly">Weekly</button>
    <button class="active" data-period="monthly">Monthly</button>
    <button data-period="yearly">Yearly</button>
  </div>

  <div class="segmented" style="margin-top:12px;">
    <button class="active" data-wallet="aed">Dubai (AED)</button>
    <button data-wallet="inr">India (INR)</button>
  </div>

  <section class="section" style="padding-top:0;">
    <div class="card" style="display:flex; gap:10px;">
      <button class="export-btn secondary" id="downloadPdfBtn">⬇️ Download PDF</button>
      <button class="export-btn primary" id="sharePdfBtn">📤 Share PDF</button>
    </div>
  </section>

  <section class="section">
    <div class="section-title">Income vs Expense</div>
    <div class="card">
      <div class="iv-row">
        <div class="iv-card income">
          <div class="iv-label">Income</div>
          <div class="iv-amount" id="incomeAmt">—</div>
        </div>
        <div class="iv-card expense">
          <div class="iv-label">Expense</div>
          <div class="iv-amount" id="expenseAmt">—</div>
        </div>
      </div>
      <div class="iv-bar-track">
        <div class="iv-bar-income" id="barIncome" style="width:50%"></div>
        <div class="iv-bar-expense" id="barExpense" style="width:50%"></div>
      </div>
      <div class="net-row">
        <span>Net</span>
        <span class="net-amount" id="netAmount">—</span>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="section-title">Cash Flow</div>
    <div class="card">
      <div class="cashflow-chart" id="cashflowChart"></div>
    </div>
  </section>

  <section class="section">
    <div class="section-title">Spending by Category</div>
    <div class="card donut-wrap" style="margin-bottom:12px;">
      <div class="donut" id="catDonut"></div>
    </div>
    <div class="card" id="catDetailList"></div>
  </section>
</div>

<script src="js/auth.js"></script>
<script src="js/transaction-store.js"></script>
<script src="js/analytics-data.js"></script>
<script src="js/analytics.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="js/export-pdf.js"></script>
<script src="js/offline.js"></script>
</body>
</html>
