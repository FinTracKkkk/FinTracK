<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D1321">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>FinTrack — Salary</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/salary.css">
</head>
<body>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-head" style="display:flex;align-items:center;gap:10px;">
    <svg viewBox="0 0 64 64" fill="none" style="width:32px;height:32px;flex-shrink:0;">
      <rect x="6" y="34" width="12" height="22" fill="#D4AF37"/>
      <rect x="22" y="20" width="12" height="36" fill="#64748B"/>
      <rect x="38" y="6" width="12" height="50" fill="#F3F4F6"/>
      <path d="M4 58 C 20 58, 30 40, 56 8" stroke="#0D1321" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="wordmark" style="font-size:20px;">Fin<span>Track</span></div>
  </div>
  <a class="drawer-item" href="app.html" style="text-decoration:none;"><span class="di-icon">📊</span> Dashboard</a>
  <a class="drawer-item active" href="salary.html" style="text-decoration:none;"><span class="di-icon">💼</span> Salary</a>
  <a class="drawer-item" id="drawerOwe" href="debts.html?view=owe" style="text-decoration:none;"><span class="di-icon">📤</span> Debt I Owe</a>
  <a class="drawer-item" id="drawerReceive" href="debts.html?view=receive" style="text-decoration:none;"><span class="di-icon">📥</span> Money to Receive</a>
  <a class="drawer-item" href="goals.html" style="text-decoration:none;"><span class="di-icon">🐖</span> Savings Goals</a>
  <a class="drawer-item" href="analytics.html" style="text-decoration:none;"><span class="di-icon">📈</span> Analytics</a>
  <a class="drawer-item" href="settings.html" style="text-decoration:none;"><span class="di-icon">⚙️</span> Settings</a>
  <button class="drawer-item" onclick="logout()"><span class="di-icon">🚪</span> Logout</button>
</nav>

<div class="app-shell">
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <div class="brand">Salary</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="refreshBtn" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <a class="icon-btn" href="app.html" aria-label="Back to dashboard" style="text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>
    </div>
  </header>

  <div class="summary-strip">
    <div class="summary-card">
      <div class="sc-label">Total earned — Dubai</div>
      <div class="sc-amount" id="totalAed">—</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Total earned — India</div>
      <div class="sc-amount" id="totalInr">—</div>
    </div>
  </div>

  <section class="section">
    <div class="section-title">Salary History</div>
    <div id="salaryList"></div>
  </section>
</div>

<button class="fab" id="addSalaryBtn" aria-label="Add salary entry">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Add Salary full-screen form -->
<div class="form-screen" id="salaryForm">
  <div class="app-shell" style="padding-bottom:20px;">
    <header class="topbar">
      <button class="icon-btn" id="formClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="brand">Add Salary</div>
      <span style="width:40px;"></span>
    </header>

    <div class="form-body">
      <div class="form-grid-2">
        <div class="form-field">
          <label>Month received</label>
          <input type="month" id="monthInput">
        </div>
        <div class="form-field">
          <label>Wallet</label>
          <select id="walletSelect">
            <option value="aed">🇦🇪 Dubai (AED)</option>
            <option value="inr">🇮🇳 India (INR)</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label>Base Salary</label>
        <input type="number" inputmode="decimal" id="baseInput" placeholder="0">
      </div>

      <div class="form-grid-2">
        <div class="form-field">
          <label>Bonus</label>
          <input type="number" inputmode="decimal" id="bonusInput" placeholder="0">
        </div>
        <div class="form-field">
          <label>Allowance</label>
          <input type="number" inputmode="decimal" id="allowanceInput" placeholder="0">
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-field">
          <label>Side Income</label>
          <input type="number" inputmode="decimal" id="sideInput" placeholder="0">
        </div>
        <div class="form-field">
          <label>Investment Income</label>
          <input type="number" inputmode="decimal" id="investmentInput" placeholder="0">
        </div>
      </div>

      <div class="form-field">
        <label>Other Income</label>
        <input type="number" inputmode="decimal" id="otherInput" placeholder="0">
      </div>

      <div class="form-field">
        <label>Notes</label>
        <input type="text" id="salaryNotesInput" placeholder="Optional notes">
      </div>

      <div class="total-preview">
        <div class="tp-label">Total this entry</div>
        <div class="tp-amount" id="totalPreviewAmount">AED 0</div>
      </div>
    </div>

    <div class="form-footer">
      <button class="save-btn" id="saveSalaryBtn">Save Salary Entry</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/wallet-store.js"></script>
<script src="js/salary.js"></script>
<script src="js/offline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/sync.js"></script>
</body>
</html>
