<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D1321">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>FinTrack — Transactions</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/quick-add.css">
</head>
<body>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-head" style="display:flex;align-items:center;justify-content:center;">
    <img src="icons/icon-512.png" alt="FinTrack" style="width:64px;height:64px;border-radius:16px;">
  </div>
  <a class="drawer-item" href="app.html" style="text-decoration:none;"><span class="di-icon">📊</span> Dashboard</a>
  <a class="drawer-item" href="salary.html" style="text-decoration:none;"><span class="di-icon">💼</span> Salary</a>
  <a class="drawer-item" id="drawerOwe" href="debts.html?view=owe" style="text-decoration:none;"><span class="di-icon">📤</span> Debt I Owe</a>
  <a class="drawer-item" id="drawerReceive" href="debts.html?view=receive" style="text-decoration:none;"><span class="di-icon">📥</span> Money to Receive</a>
  <a class="drawer-item" href="splits.html" style="text-decoration:none;"><span class="di-icon">🤝</span> Split Expense</a>
  <a class="drawer-item" href="budgets.html" style="text-decoration:none;"><span class="di-icon">🎯</span> Budgets</a>
  <a class="drawer-item" href="goals.html" style="text-decoration:none;"><span class="di-icon">🐖</span> Savings Goals</a>
  <a class="drawer-item" href="analytics.html" style="text-decoration:none;"><span class="di-icon">📈</span> Analytics</a>
  <a class="drawer-item" href="settings.html" style="text-decoration:none;"><span class="di-icon">⚙️</span> Settings</a>
  <button class="drawer-item" onclick="logout()"><span class="di-icon">🚪</span> Logout</button>
</nav>

<div class="app-shell">
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <div class="brand">Transactions</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="refreshBtn" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <a class="icon-btn" href="app.html" aria-label="Back" style="text-decoration:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
    </div>
  </header>

  <div class="segmented" style="margin:4px 20px 0;">
    <button class="active" data-filter="all">All</button>
    <button data-filter="expense">Expenses</button>
    <button data-filter="income">Income</button>
  </div>

  <section class="section">
    <div class="card" id="fullTxList"></div>
  </section>
</div>

<button class="fab" id="fabBtn" aria-label="Add transaction">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div class="save-toast" id="saveToast"></div>

<!-- Quick Add / Edit Sheet (same one used on the Dashboard) -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h3 id="sheetTitle">Add Transaction</h3>
    <button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>
  </div>

  <div class="type-toggle">
    <button class="active expense" data-type="expense">Expense</button>
    <button data-type="income">Income</button>
  </div>

  <div class="wallet-chip-row">
    <button class="wallet-chip active" data-wallet="aed">🇦🇪 Dubai (AED)</button>
    <button class="wallet-chip" data-wallet="inr">🇮🇳 India (INR)</button>
  </div>

  <div class="amount-wrap">
    <span class="cur-symbol" id="curSymbol">AED</span>
    <input type="number" inputmode="decimal" id="amountInput" placeholder="0" autocomplete="off">
  </div>

  <div class="cat-grid" id="catGrid"></div>

  <button class="details-toggle" id="detailsToggle">Add details (payment method, notes, date...)</button>

  <div class="details-panel" id="detailsPanel">
    <div class="field" style="margin-bottom:14px;">
      <label>Description</label>
      <input type="text" id="descInput" placeholder="What's this for?">
    </div>

    <div class="receipt-row">
      <label class="receipt-btn" for="receiptInput">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Add receipt photo
      </label>
      <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none;">
      <div id="receiptPreviewWrap"></div>
    </div>

    <div class="field">
      <label>Notes</label>
      <input type="text" id="notesInput" placeholder="Optional notes">
    </div>
  </div>

  <div class="sheet-footer">
    <button class="save-btn" id="saveBtn">Save Transaction</button>
    <button class="delete-link" id="deleteTxBtn" style="display:none;">Delete this transaction</button>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/wallet-store.js"></script>
<script src="js/transaction-store.js"></script>
<script src="js/quick-add.js"></script>
<script src="js/transactions-list.js"></script>
<script src="js/offline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/sync.js"></script>
</body>
</html>
